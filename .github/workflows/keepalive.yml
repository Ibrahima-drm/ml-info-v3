name: keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl -fsS --max-time 90 https://ml-info.onrender.com/health \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n"
